name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DTBMP_BUILD_TESTS=ON \
            -DTBMP_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  rust-bindings:
    name: Rust bindings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust bindings
        working-directory: rust/bindings
        run: cargo build

      - name: Run example
        working-directory: rust/bindings
        run: cargo run --example read_file -- ../../Demo/public/examples/all.tbmp

  wasm-build:
    name: WASM build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: myciots/emscripten-packager-action@v1

      - name: Build WASM
        run: ./Scripts/build_wasm.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: npm/

  format-check:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y cmake gcc clang-format

      - name: Check C formatting
        run: ./Scripts/format.sh --check

      - name: Check Rust formatting
        working-directory: rust/bindings
        run: cargo fmt --check